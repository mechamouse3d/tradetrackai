version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tradetrack_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tradetrack_ai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tradetrack_backend
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/tradetrack_ai_db
      PORT: 5001
      NODE_ENV: development
      JWT_SECRET: dev-secret-key
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src
    command: npm run dev

  # Frontend React App
  frontend:
    build:
      context: ./tradetrack-ai
      dockerfile: Dockerfile
    container_name: tradetrack_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5001/api
    volumes:
      - ./tradetrack-ai:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:

networks:
  default:
    name: tradetrack_network
